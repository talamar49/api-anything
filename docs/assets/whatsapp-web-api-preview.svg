<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">API Anything WhatsApp Web adapter preview</title>
  <desc id="desc">A visual overview showing WhatsApp Web wrapped as JSON capabilities for agents and humans.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061A16"/>
      <stop offset="0.55" stop-color="#0B3028"/>
      <stop offset="1" stop-color="#0E1E35"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102A24"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif}
      .small{font-size:20px}.tiny{font-size:16px}.label{font-size:18px;letter-spacing:.08em;text-transform:uppercase}.title{font-size:50px;font-weight:800}.h2{font-size:27px;font-weight:750}.code{font-size:18px}.muted{fill:#9CA3AF}.green{fill:#25D366}.white{fill:#F8FAFC}.blue{fill:#93C5FD}.amber{fill:#FCD34D}
    </style>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1040" cy="110" r="170" fill="#25D366" opacity="0.08"/>
  <circle cx="160" cy="680" r="210" fill="#60A5FA" opacity="0.08"/>

  <text x="64" y="84" class="sans label green">API Anything adapter</text>
  <text x="64" y="142" class="sans title white">WhatsApp Web as a safe API</text>
  <text x="64" y="184" class="sans small muted">Humans keep using the website. Agents get typed JSON capabilities.</text>

  <g>
    <rect x="64" y="238" width="338" height="404" rx="28" fill="url(#card)" stroke="#21443B"/>
    <rect x="92" y="270" width="282" height="54" rx="18" fill="#075E54"/>
    <circle cx="120" cy="297" r="15" fill="#25D366"/>
    <text x="148" y="305" class="sans small white">WhatsApp Web</text>
    <rect x="94" y="356" width="212" height="34" rx="17" fill="#1F2937"/>
    <rect x="94" y="408" width="250" height="34" rx="17" fill="#1F2937"/>
    <rect x="94" y="460" width="176" height="34" rx="17" fill="#1F2937"/>
    <rect x="151" y="528" width="220" height="48" rx="20" fill="#DCF8C6"/>
    <text x="174" y="558" class="sans tiny" fill="#064E3B">Send approved message</text>
    <text x="96" y="616" class="sans tiny muted">existing browser session • no passwords stored</text>
  </g>

  <path d="M422 440 C470 440 470 440 518 440" stroke="#25D366" stroke-width="6" stroke-linecap="round"/>
  <path d="M500 421 L522 440 L500 459" stroke="#25D366" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
    <rect x="536" y="238" width="600" height="404" rx="28" fill="#0B1120" stroke="#263244"/>
    <rect x="536" y="238" width="600" height="58" rx="28" fill="#111827"/>
    <circle cx="576" cy="267" r="8" fill="#EF4444"/><circle cx="604" cy="267" r="8" fill="#F59E0B"/><circle cx="632" cy="267" r="8" fill="#22C55E"/>
    <text x="672" y="274" class="mono tiny muted">api-anything run whatsapp-web send_message</text>
    <text x="572" y="344" class="mono code blue">$ api-anything inspect whatsapp-web</text>
    <text x="572" y="390" class="mono code white">capabilities:</text>
    <text x="600" y="426" class="mono code green">✓ list_chats</text>
    <text x="600" y="462" class="mono code green">✓ extract_chat_by_date</text>
    <text x="600" y="498" class="mono code amber">⚠ send_message  type: write</text>
    <text x="572" y="554" class="mono code white">{ "ok": true, "message_id": "...",</text>
    <text x="572" y="588" class="mono code white">  "evidence": "sent item visible" }</text>
  </g>

  <g>
    <rect x="736" y="674" width="360" height="42" rx="21" fill="#052E24" stroke="#1F7A55"/>
    <text x="762" y="702" class="sans tiny green">Writes require --confirmed + human approval</text>
  </g>
</svg>
